document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#EDF1F6;color:#0F1729;-webkit-font-smoothing:antialiased}\nbutton{font-family:inherit;cursor:pointer}\ninput,textarea,select{font-family:inherit;outline:none}\n::-webkit-scrollbar{height:9px;width:9px}\n::-webkit-scrollbar-thumb{background:#C2C9D6;border-radius:8px}\n@keyframes stepIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}\n@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}\n@keyframes spin{to{transform:rotate(360deg)}}\n@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}\n@keyframes pulseSoft{0%,100%{opacity:.55}50%{opacity:1}}\n.layout{display:flex;min-height:100vh;align-items:stretch}\n.sidebar{width:268px;flex:none}\n.sidenav{display:flex;flex-direction:column;gap:3px}\n.cell{min-width:0}\n.mcol{display:none}\n@media(max-width:880px){\n .layout{flex-direction:column}\n .sidebar{width:auto !important;position:sticky !important;top:0;z-index:50;border-right:none !important;border-bottom:1.5px solid #DCE2EA;max-height:none !important;padding:10px 12px !important;box-shadow:0 6px 16px -12px rgba(16,24,40,.12)}\n .side-top{display:flex !important;align-items:center;gap:12px;margin-bottom:10px !important}\n .side-meta{margin:0 0 0 auto !important;padding:6px 11px 6px 8px !important;flex:none}\n .side-meta .mlabel{display:none}\n .sidenav{flex-direction:row;overflow-x:auto;gap:7px;padding-bottom:4px;scroll-snap-type:x proximity}\n .sidenav-item{flex:none;width:auto;scroll-snap-align:start}\n .phase-label{display:none !important}\n .sidenav-item button{flex-direction:column !important;width:62px !important;gap:4px !important;padding:7px 5px !important;align-items:center !important;text-align:center !important}\n .sidenav-item .nav-title{font-size:9px !important;line-height:1.05 !important;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}\n .side-actions{margin-top:10px !important}\n .dhead{display:none !important}\n .drow{grid-template-columns:1fr 1fr !important;min-width:0 !important;border:1.5px solid #E4E9F0 !important;border-radius:12px;margin:9px 4px;padding:11px !important;gap:10px !important;align-items:end !important}\n .drow .cell-name{grid-column:1 / -1}\n .drow .cell-x{grid-column:1 / -1;display:flex;justify-content:flex-end;margin-top:-4px}\n .mcol{display:block;font-size:9.5px;font-weight:800;color:#7A8699;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}\n}\n@media print{.sidebar,.mascot-wrap{display:none}body{background:#fff}}\n/* ---- Sentry the mascot ---- */\n@keyframes mascotBounce{0%,100%{transform:translateY(0)}28%{transform:translateY(-11px)}55%{transform:translateY(-3px)}78%{transform:translateY(-6px)}}\n@keyframes mascotShake{10%,90%{transform:translateX(-3px) rotate(-4deg)}30%,70%{transform:translateX(3px) rotate(4deg)}50%{transform:translateX(-3px) rotate(-2deg)}}\n@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}\n@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(9deg)}75%{transform:rotate(-9deg)}}\n@keyframes bubbleIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:none}}\n@keyframes sparkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}\n.mascot-body{animation:floatY 3.2s ease-in-out infinite;transition:none}\n.mascot-body.mood-happy{animation:mascotBounce .7s ease}\n.mascot-body.mood-oops{animation:mascotShake .55s ease}\n.m-eyes{transform-box:fill-box;transform-origin:center;animation:blink 4.6s infinite}\n.m-antenna{transform-box:fill-box;transform-origin:bottom center;animation:wiggle 2.6s ease-in-out infinite}\n.m-happy,.m-oops,.m-spark{display:none}\n.mood-happy .m-neutral{display:none}.mood-happy .m-happy{display:block}.mood-happy .m-spark{display:block}\n.mood-oops .m-neutral{display:none}.mood-oops .m-oops{display:block}\n.mood-happy .m-eyes{animation:none}\n@media(max-width:880px){\n .mascot-wrap{right:10px !important;bottom:10px !important}\n .mascot-bubble{max-width:62vw !important;font-size:12px !important}\n .mascot-svg{width:52px !important;height:52px !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(900px 600px at 50% 0%,#D8F0DF,transparent 60%),#EDF1F6\">\n    <div style=\"width:52px;height:52px;border-radius:15px;background:#15A34A;box-shadow:0 14px 30px -8px rgba(16,24,40,.18);animation:floatY 2.2s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Sans',system-ui,sans-serif;font-weight:800;font-size:22px\">Information Security Program Console<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#7A8699;font-family:'IBM Plex Mono',monospace;animation:pulseSoft 1.4s ease-in-out infinite\">booting your program workspace…<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ ready }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"layout\">\n  <!-- ============ SIDEBAR ============ -->\n  <sc-if value=\"{{ sidebarOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <aside class=\"sidebar\" style=\"background:#fff;border-right:1.5px solid #DCE2EA;padding:16px 14px;position:sticky;top:0;align-self:flex-start;max-height:100vh;overflow:auto\">\n    <div class=\"side-top\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n      <img src=\"6634c428-72dd-4e8d-8d99-3b018826180f\" alt=\"IS Program logo\" style=\"width:36px;height:36px;border-radius:10px;flex:none;object-fit:cover;box-shadow:0 6px 14px -6px rgba(16,24,40,.28)\">\n      <div style=\"min-width:0;flex:1\">\n        <div style=\"fo \">\n      <div style=\"display:flex;align-items:center;gap:11px\">\n        <div style=\"position:relative;width:48px;height:48px;flex:none\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" style=\"display:block\">\n            <circle cx=\"24\" cy=\"24\" r=\"18\" fill=\"none\" stroke=\"#DCE2EA\" stroke-width=\"5\"><\u002Fcircle>\n            <circle cx=\"24\" cy=\"24\" r=\"18\" fill=\"none\" stroke=\"#15A34A\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-dasharray=\"113.1\" style=\"stroke-dashoffset:{{ maturityOffset }};transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .7s ease\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0B7A36\">{{ maturityPct }}%<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"line-height:1.2\">\n          <div class=\"mlabel\" style=\"font-size:10px;color:#7A8699;text-transform:uppercase;letter-spacing:.6px;font-weight:700\">Program maturity<\u002Fdiv>\n          <div style=\"font-size:13px;font-weight:800\">{{ maturityLabel }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#0E9384;font-weight:700;font-family:'IBM Plex Mono',monospace\">{{ doneCount }}/{{ totalStations }} stations<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav class=\"sidenav\">\n      <sc-for list=\"{{ stations }}\" as=\"s\" hint-placeholder-count=\"11\">\n        <div class=\"sidenav-item\">\n          <sc-if value=\"{{ s.showBuild }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:9.5px;font-weight:800;letter-spacing:1px;color:#15A34A;font-family:'IBM Plex Mono',monospace;padding:8px 8px 4px\" class=\"phase-label\">PHASE 1 · DEVELOP<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ s.showRun }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:9.5px;font-weight:800;letter-spacing:1px;color:#0E9384;font-family:'IBM Plex Mono',monospace;padding:10px 8px 4px\" class=\"phase-label\">PHASE 2 · MANAGE<\u002Fdiv>\n          <\u002Fsc-if>\n          <button onclick=\"{{ s.onClick }}\" style=\"width:100%;display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:11px;border:none;text-align:left;transition:all .15s;{{ s.rowStyle }}\">\n            <div style=\"width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;{{ s.numStyle }}\">{{ s.numLabel }}<\u002Fdiv>\n            <div class=\"nav-title\" style=\"font-size:12.5px;font-weight:700;line-height:1.15;{{ s.textStyle }}\">{{ s.title }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div class=\"side-actions\" style=\"display:flex;gap:7px;margin-top:14px\">\n      <button onclick=\"{{ onExport }}\" style=\"flex:1;padding:8px;border-radius:10px;border:1.5px solid #DCE2EA;background:#fff;font-size:11.5px;font-weight:700;color:#475467\">Export JSON<\u002Fbutton>\n      <button onclick=\"{{ onReset }}\" style=\"flex:1;padding:8px;border-radius:10px;border:1.5px solid #E5484D44;background:#fff;font-size:11.5px;font-weight:700;color:#E5484D\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n  <\u002Fsc-if>\n\n  <!-- reopen sidebar button (shown when collapsed) -->\n  <sc-if value=\"{{ sidebarClosed }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ onToggleSidebar }}\" title=\"Show sidebar\" style=\"position:fixed;top:12px;left:12px;z-index:70;display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:11px;border:1.5px solid #DCE2EA;background:#fff;color:#15A34A;font-weight:800;font-size:12.5px;box-shadow:0 8px 20px -8px rgba(16,24,40,.25)\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"><\u002Fline><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\"><\u002Fline><\u002Fsvg>\n      Menu\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- ============ MAIN ============ -->\n  <main style=\"flex:1;min-width:0;padding:22px clamp(16px,3vw,34px) 70px;max-width:1080px;margin:0 auto;width:100%\">\n    <div key=\"{{ cur.id }}\" data-screen-label=\"Station {{ cur.tag }}\" style=\"animation:stepIn .4s cubic-bezier(.2,.7,.3,1) both\">\n\n      <!-- STATION HEADER -->\n      <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:4px\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;color:#fff;padding:4px 9px;border-radius:8px;{{ cur.accentBar }}\">{{ cur.tag }}<\u002Fspan>\n        <span style=\"font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;{{ cur.accentText }}\">{{ cur.phaseLabel }}<\u002Fspan>\n        <span style=\"font-size:11px;color:#7A8699\">·  your role: <b style=\"color:#475467\">{{ cur.hat }}<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'IBM Plex Sans',system-ui,sans-serif;font-weight:800;font-size:clamp(23px,3.6vw,31px);letter-spacing:-.6px;margin:0 0 8px\">{{ cur.title }}<\u002Fh1>\n\n      <!-- BRIEF -->\n      <div style=\"display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px\">\n        <div style=\"background:#fff;border:1.5px solid #DCE2EA;border-radius:16px;padding:15px 17px;display:flex;gap:13px;align-items:flex-start\">\n          <div style=\"width:6px;align-self:stretch;border-radius:6px;flex:none;{{ cur.accentBar }}\"><\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font-size:15px;line-height:1.5;font-weight:700;color:#0F1729\">{{ cur.objective }}<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.55;color:#475467;margin-top:6px\">{{ cur.why }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:11px\">\n              <sc-for list=\"{{ cur.steps }}\" as=\"st\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:7px;background:#F4F6F9;border:1px solid #E4E9F0;border-radius:9px;padding:6px 10px;font-size:12px;font-weight:600;color:#475467\">\n                  <span style=\"width:16px;height:16px;border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;{{ cur.accentBar }}\">{{ st.n }}<\u002Fspan>{{ st.t }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- COMPLETION CHECKLIST -->\n      <div style=\"border:1.5px solid;border-radius:16px;padding:14px 16px;margin-bottom:18px;{{ cur.completeBg }}\">\n        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n          <span style=\"width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;background:{{ cur.completeChipBg }}\">{{ cur.completeIcon }}<\u002Fspan>\n          <div style=\"font-weight:800;font-size:14px;color:#0F1729\">{{ cur.completeMsg }}<\u002Fdiv>\n          <span style=\"margin-left:auto;font-size:11px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:#475467;background:#fff;border:1.5px solid #DCE2EA;border-radius:999px;padding:4px 11px\">{{ cur.criteriaCount }} done<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:11px\">\n          <sc-for list=\"{{ cur.criteria }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;line-height:1.3;{{ c.rowStyle }}\">\n              <span style=\"width:18px;height:18px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;{{ c.dotStyle }}\">{{ c.icon }}<\u002Fspan><span style=\"flex:1\">{{ c.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============================ STATION TOOLS ============================ -->\n\n      <!-- 1 · CHARTER -->\n      <sc-if value=\"{{ view.isCharter }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start\">\n          <div style=\"background:#fff;border:1.5px solid #DCE2EA;border-radius:18px;padding:18px\">\n            <div style=\"font-weight:800;font-size:15px;margin-bottom:13px\">Program details<\u002Fdiv>\n            <label style=\"font-size:11px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px\">Program / organization name<\u002Flabel>\n            <input value=\"{{ p.name }}\" onchange=\"{{ onName }}\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:11px;padding:10px 12px;font-size:14px;background:#FAFBFD;margin:5px 0 13px\">\n            <label style=\"font-size:11px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px\">Mission (business language)<\u002Flabel>\n            <textarea value=\"{{ p.mission }}\" onchange=\"{{ onMission }}\" rows=\"3\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.5;background:#FAFBFD;resize:vertical;margin:5px 0 13px\"><\u002Ftextarea>\n            <label style=\"font-size:11px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px\">Scope<\u002Flabel>\n            <textarea value=\"{{ p.scope }}\" onchange=\"{{ onScope }}\" rows=\"2\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.5;background:#FAFBFD;resize:vertical;margin:5px 0 13px\"><\u002Ftextarea>\n            <label style=\"font-size:11px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px\">Executive authority / sponsor<\u002Flabel>\n            <textarea value=\"{{ p.sponsor }}\" onchange=\"{{ onSponsor }}\" rows=\"2\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.5;background:#FAFBFD;resize:vertical;margin:5px 0 4px\"><\u002Ftextarea>\n            <div style=\"margin-top:12px\">\n              <label style=\"font-size:11px;font-weight:800;color:#475467;text-transform:uppercase;letter-spacing:.4px\">Objectives<\u002Flabel>\n              <div style=\"display:flex;flex-direction:column;gap:6px;margin:7px 0\">\n                <sc-for list=\"{{ view.objectives }}\" as=\"o\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:8px;background:#F4F6F9;border:1px solid #E4E9F0;border-radius:9px;padding:7px 10px;animation:rowIn .25s both\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;flex:none;{{ cur.accentBar }}\"><\u002Fspan>\n                    <span style=\"flex:1;font-size:13px;font-weight:600\">{{ o.t }}<\u002Fspan>\n                    <button onclick=\"{{ o.onRemove }}\" style=\"border:none;background:none;color:#C2C9D6;font-size:15px;font-weight:800;padding:0 4px\">×<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px\">\n                <input value=\"{{ view.draftObjective }}\" onchange=\"{{ onDraftObjective }}\" placeholder=\"Add an objective…\" style=\"flex:1;border:1.5px solid #DCE2EA;border-radius:10px;padding:9px 11px;font-size:13px;background:#FAFBFD\">\n                <button onclick=\"{{ view.onAddObjective }}\" style=\"padding:9px 15px;border-radius:10px;border:none;color:#fff;font-weight:800;font-size:13px;{{ cur.accentBar }}\">Add<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:linear-gradient(160deg,#1E1B3A,#312A63);border-radius:18px;padding:22px;color:#fff;position:relative;overflow:hidden\">\n            <div style=\"position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)\"><\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;opacity:.7\">SECURITY PROGRAM CHARTER<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Sans',system-ui,sans-serif;font-weight:800;font-size:21px;margin:6px 0 16px;line-height:1.1\">{{ p.name }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:800;letter-spacing:.6px;opacity:.6;text-transform:uppercase\">Mission<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.55;margin:3px 0 13px;opacity:.95\">{{ view.charterMission }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:800;letter-spacing:.6px;opacity:.6;text-transform:uppercase\">Scope<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.55;margin:3px 0 13px;opacity:.95\">{{ view.charterScope }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:800;letter-spacing:.6px;opacity:.6;text-transform:uppercase\">Authority<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.55;margin:3px 0 13px;opacity:.95\">{{ view.charterSponsor }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:800;letter-spacing:.6px;opacity:.6;text-transform:uppercase\">Objectives<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:5px;margin-top:5px\">\n              <sc-for list=\"{{ view.objectives }}\" as=\"o\" hint-placeholder-count=\"3\">\n                <div style=\"font-size:12.5px;line-height:1.4;opacity:.95;display:flex;gap:7px\"><span style=\"color:#0E9384;font-weight:800\">✓<\u002Fspan>{{ o.t }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px;display:inline-flex;align-items:center;gap:7px;background:{{ view.charterChipBg }};border-radius:999px;padding:5px 12px;font-size:11px;font-weight:800\">{{ view.charterStatus }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 2 · ASSETS -->\n      <sc-if value=\"{{ view.isAssets }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px\">\n          <sc-for list=\"{{ view.classSummary }}\" as=\"cs\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1 1 130px;background:#fff;border:1.5px solid #DCE2EA;border-radius:14px;padding:12px 14px\">\n              <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:10px;height:10px;border-radius:3px;background:{{ cs.color }}\"><\u002Fspan><span style=\"font-weight:800;font-size:13px\">{{ cs.label }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Sans',system-ui,sans-serif;font-weight:800;font-size:26px;margin-top:4px\">{{ cs.count }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1.5px solid #DCE2EA;border-radius:18px;padding:6px 6px 10px;overflow:auto\">\n          <div class=\"dhead\" style=\"display:grid;grid-template-columns:1.6fr .9fr 1.1fr .8fr .8fr 1.1fr 30px;gap:8px;padding:11px 12px;font-size:10.5px;font-weight:800;color:#7A8699;text-transform:uppercase;letter-spacing:.5px;min-width:720px\">\n            <div>Asset<\u002Fdiv><div>Type<\u002Fdiv><div>Owner<\u002Fdiv><div>Criticality<\u002Fdiv><div>Sensitivity<\u002Fdiv><div>Classification<\u002Fdiv><div><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ view.assetRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div class=\"drow\" style=\"display:grid;grid-template-columns:1.6fr .9fr 1.1fr .8fr .8fr 1.1fr 30px;gap:8px;padding:8px 12px;align-items:center;border-top:1px solid #EAEEF3;min-width:720px;animation:rowIn .25s both\">\n              <div class=\"cell cell-name\"><span class=\"mcol\">Asset<\u002Fspan><input value=\"{{ r.name }}\" onchange=\"{{ r.onName }}\" style=\"width:100%;border:1.5px solid transparent;border-radius:8px;padding:9px 8px;font-size:12.5px;font-weight:600;background:#F4F6F9\"><\u002Fdiv>\n              <div class=\"cell\"><span class=\"mcol\">Type<\u002Fspan><select key=\"ty{{ r.type }}\" value=\"{{ r.type }}\" onchange=\"{{ r.onType }}\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:8px;padding:9px 6px;font-size:12px;background:#fff\">\n                <option value=\"Data\">Data<\u002Foption><option value=\"System\">System<\u002Foption><option value=\"Application\">Application<\u002Foption><option value=\"Facility\">Facility<\u002Foption><option value=\"Personnel\">Personnel<\u002Foption><option value=\"Network\">Network<\u002Foption>\n              <\u002Fselect><\u002Fdiv>\n              <div class=\"cell\"><span class=\"mcol\">Owner<\u002Fspan><input value=\"{{ r.owner }}\" onchange=\"{{ r.onOwner }}\" style=\"width:100%;border:1.5px solid transparent;border-radius:8px;padding:9px 8px;font-size:12px;background:#F4F6F9\"><\u002Fdiv>\n              <div class=\"cell\"><span class=\"mcol\">Criticality<\u002Fspan><select key=\"cr{{ r.crit }}\" value=\"{{ r.crit }}\" onchange=\"{{ r.onCrit }}\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:8px;padding:9px 6px;font-size:12px;background:#fff\">\n                <option value=\"High\">High<\u002Foption><option value=\"Medium\">Medium<\u002Foption><option value=\"Low\">Low<\u002Foption>\n              <\u002Fselect><\u002Fdiv>\n              <div class=\"cell\"><span class=\"mcol\">Sensitivity<\u002Fspan><select key=\"se{{ r.sens }}\" value=\"{{ r.sens }}\" onchange=\"{{ r.onSens }}\" style=\"width:100%;border:1.5px solid #DCE2EA;border-radius:8px;padding:9px 6px;font-size:12px;background:#f dth:0\">\n            <div style=\"font-family:'IBM Plex Sans',system-ui,sans-serif;font-weight:800;font-size:16px\">Sentry explains<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#7A8699;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">\"{{ explain.sel }}\"<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onCloseExplain }}\" style=\"width:30px;height:30px;border-radius:9px;border:1.5px solid #DCE2EA;background:#fff;color:#7A8699;font-size:16px;font-weight:800;flex:none\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 20px\">\n          <sc-if value=\"{{ explain.busy }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:11px;color:#15A34A;font-weight:700;font-size:13.5px;padding:14px 0\">\n              <span class=\"ex-spin\" style=\"width:18px;height:18px;border-radius:50%;border:2.6px solid #15A34A33;border-top-color:#15A34A;display:inline-block;animation:spin .7s linear infinite\"><\u002Fspan>\n              Sentry is reading your selection…\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ explain.hasErr }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#B42318;background:#FEF3F2;border:1px solid #FDA29B66;border-radius:10px;padding:11px 13px;line-height:1.5\">{{ explain.err }}<\u002Fdiv>\n            <button onclick=\"{{ onRetryExplain }}\" style=\"margin-top:12px;padding:8px 15px;border-radius:9px;border:1.5px solid #DCE2EA;background:#fff;color:#475467;font-weight:700;font-size:13px\">Try again<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ explain.hasText }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"ex-body\" style=\"font-size:13.5px;color:#1D2939\" dangerouslysetinnerhtml=\"{{ explain.bodyHtmlObj }}\"><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = { loading:true, ready:false, current:0, program:null,\n    draftObjective:\"\", draftAsset:{name:\"\"}, draftMetric:{name:\"\"},\n    draftControl:{name:\"\"}, draftTraining:{audience:\"All personnel\"}, draftVendor:{name:\"\"},\n    mascot:{mood:'idle',msg:''}, mascotOpen:true, ai:{},\n    settings:{open:false, draftKey:'', show:false, status:'', statusKind:'', testing:false},\n    sidebarOpen:true, sentryOn:true,\n    selection:null, explain:{open:false, sel:'', busy:false, text:'', err:''} };\n  KEY = 'cism_d3_console_v1';\n  AKEY = 'cism_d3_anthropic_key';\n  UIKEY = 'cism_d3_ui_v1';\n\n  async componentDidMount(){\n    let mod;\n    const stUrl = (typeof window!=='undefined' && window.__resources && window.__resources.stations) || './program-stations.js';\n    try { mod = await import(stUrl); }\n    catch(e){ try{ mod = await import(new URL('program-stations.js', document.baseURI).href); }catch(e2){ console.error(e2); return; } }\n    this.M = mod;\n    try{ this.apiKey = localStorage.getItem(this.AKEY) || ''; }catch(e){ this.apiKey=''; }\n    let ui={}; try{ ui=JSON.parse(localStorage.getItem(this.UIKEY)||'{}')||{}; }catch(e){}\n    let saved=null; try{ saved=JSON.parse(localStorage.getItem(this.KEY)||'null'); }catch(e){}\n    const program = (saved&&saved.program) ? saved.program : mod.seedProgram();\n    this.normalize(program);\n    this.setState({ loading:false, ready:true, program, current:(saved&&saved.current)||0,\n      sidebarOpen: ui.sidebarOpen!==false, sentryOn: ui.sentryOn!==false });\n    if(typeof window!=='undefined'){ this._onUp=(e)=>this.onSelectionUp(e); window.addEventListener('mouseup',this._onUp); window.addEventListener('touchend',this._onUp); }\n  }\n  normalize(p){\n    ['objectives','assets','documents','metrics','controls','training','vendors'].forEach(k=>{ if(!Array.isArray(p[k])) p[k]=[]; });\n    if(!p.frameworks) p.frameworks={control:[],risk:[],program:[],architecture:''};\n    p.controls.forEach(c=>{ if(!Array.isArray(c.assetIds)) c.assetIds=[]; if(!Array.isArray(c.integrations)) c.integrations=[]; if(!Array.isArray(c.tests)) c.tests=[]; });\n    p.vendors.forEach(v=>{ if(!Array.isArray(v.clauses)) v.clauses=[]; });\n  }\n  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify({ current:this.state.current, program:this.state.program })); }catch(e){} }\n  saveUi(){ try{ localStorage.setItem(this.UIKEY, JSON.stringify({ sidebarOpen:this.state.sidebarOpen, sentryOn:this.state.sentryOn })); }catch(e){} }\n  toggleSidebar(){ this.setState(s=>({sidebarOpen:!s.sidebarOpen}), this.saveUi.bind(this)); }\n  toggleSentry(){ this.setState(s=>({sentryOn:!s.sentryOn, selection:null}), this.saveUi.bind(this)); }\n  onSelectionUp(){\n    try{\n      const ae=document.activeElement;\n      if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')){ if(this.state.selection) this.setState({selection:null}); return; }\n      const sel=window.getSelection();\n      const txt=sel&&sel.toString().trim();\n      if(!txt||txt.length<4||!sel.rangeCount){ if(this.state.selection) this.setState({selection:null}); return; }\n      const main=document.querySelector('main'); const node=sel.anchorNode;\n      if(main&&node&&!main.contains(node)){ if(this.state.selection) this.setState({selection:null}); return; }\n      const r=sel.getRangeAt(0).getBoundingClientRect();\n      this.setState({selection:{ text:txt.slice(0,600), x:Math.round(r.left+r.width/2), y:Math.round(Math.max(8,r.top)) }});\n    }catch(e){}\n  }\n  setP(mut){ this.setState(s=>{ const p={...s.program}; mut(p); return { program:p }; }, this.save.bind(this)); }\n  uid(pre){ return pre+Math.random().toString(36).slice(2,8); }\n\n  goTo(i){ const n=Math.max(0,Math.min(this.M.STATIONS.length-1,i)); this.setState({current:n},this.save.bind(this)); try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){} }\n\n  suggestClass(crit,sens){ const r={High:3,Medium:2,Low:1}; const c=r[crit]||2,s=r[sens]||2;\n    if(s===3&&c===3) return \"Restricted\"; if(s>=3||c>=3) return \"Confidential\"; if(s>=2||c>=2) return \"Internal\"; return \"Public\"; }\n  clsColor(cls){ return {Public:'#2BB673',Internal:'#0E9384',Confidential:'#F6A623',Restricted:'#E5484D'}[cls]||'#7A8699'; }\n  docColor(t){ return {Policy:'#0B7A36',Standard:'#15A34A',Procedure:'#0E9384',Guideline:'#F6A623'}[t]||'#7A8699'; }\n  statusColor(st){ return {Planned:'#7A8699',Implemented:'#0E9384',Tested:'#2BB673'}[st]||'#7A8699'; }\n  riskColor(r){ return {High:'#E5484D',Medium:'#F6A623',Low:'#2BB673'}[r]||'#7A8699'; }\n\n  // ---- completion / maturity ----\n  done(id){ const p=this.state.program; if(!p) return false;\n    switch(id){\n      case 'charter': return !!(p.mission&&p.scope&&p.sponsor&&p.objectives.length);\n      case 'assets': return p.assets.length>=3 && p.assets.every(a=>a.cls);\n      case 'frameworks': return p.frameworks.control.length>=1 && p.frameworks.program.length>=1 && !!p.frameworks.architecture;\n      case 'documents': { const t=p.documents.map(d=>d.type); return ['Policy','Standard','Procedure'].every(x=>t.includes(x)); }\n      case 'metrics': return p.metrics.length>=3;\n      case 'controls': return p.controls.length>=3 && p.controls.every(c=>c.assetIds.length>0);\n      case 'implement': return p.controls.filter(c=>c.status!=='Planned'&&c.owner).length>=3;\n      case 'testing': return p.controls.some(c=>c.status==='Tested');\n      case 'training': return p.training.length>=2;\n      case 'vendors': return p.vendors.length>=1 && p.vendors.every(v=>v.clauses.length>0);\n      case 'console': return this.doneCount()>=8;\n      default: return false;\n    }\n  }\n  doneCount(){ return this.M.STATIONS.filter(s=>s.id!=='console').filter(s=>this.done(s.id)).length; }\n\n  // Live, visible completion criteria per station — so \"what completes this\" is never a mystery.\n  criteria(id){\n    const p=this.state.program; if(!p) return [];\n    const dt=p.documents.map(d=>d.type);\n    const cm=(label,met)=>({label,met:!!met});\n    switch(id){\n      case 'charter': return [ cm('Mission written',p.mission), cm('Scope defined',p.scope), cm('Executive sponsor named',p.sponsor), cm('At least one objective',p.objectives.length>=1) ];\n      case 'assets': return [ cm('At least 3 assets in the inventory',p.assets.length>=3), cm('Every asset has a classification',p.assets.length>0&&p.assets.every(a=>a.cls)) ];\n      case 'frameworks': return [ cm('A control framework selected',p.frameworks.control.length>=1), cm('A program-management framework selected',p.frameworks.program.length>=1), cm('A security architecture chosen',p.frameworks.architecture) ];\n      case 'documents': return [ cm('A Policy authored',dt.includes('Policy')), cm('A Standard authored',dt.includes('Standard')), cm('A Procedure authored',dt.includes('Procedure')) ];\n      case 'metrics': return [ cm('At least 3 metrics defined',p.metrics.length>=3) ];\n      case 'controls': return [ cm('At least 3 controls designed',p.controls.length>=3), cm('Every control maps to ≥1 asset',p.controls.length>0&&p.controls.every(c=>c.assetIds.length>0)) ];\n      case 'implement': return [ cm('3 controls moved past Planned',p.controls.filter(c=>c.status!=='Planned').length>=3), cm('Each of those has an owner',p.controls.filter(c=>c.status!=='Planned').length>=3&&p.controls.filter(c=>c.status!=='Planned').every(c=>c.owner)) ];\n      case 'testing': return [ cm('At least one control tested',p.controls.some(c=>c.status==='Tested')) ];\n      case 'training': return [ cm('At least 2 training plans',p.training.length>=2) ];\n      case 'vendors': return [ cm('At least one vendor added',p.vendors.length>=1), cm('Every vendor has ≥1 contract clause',p.vendors.length>0&&p.vendors.every(v=>v.clauses.length>0)) ];\n      case 'console': return [ cm('8 of 10 build/manage stations complete',this.doneCount()>=8) ];\n      default: return [];\n    }\n  }\n  maturity(){ const total=this.M.STATIONS.length-1; return Math.round(this.doneCount()/total*100); }\n\n  exportJSON(){ try{\n    const blob=new Blob([JSON.stringify(this.state.program,null,2)],{type:'application/json'});\n    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='security-program.json'; a.click();\n  }catch(e){} }\n  resetAll(){ if(typeof confirm==='function'&&!confirm('Reset the whole program to the example seed?')) return; try{localStorage.removeItem(this.KEY);}catch(e){} location.reload(); }\n\n  // ---- mascot (\"Sentry\", your program guide) ----\n  setMascot(mood,msg,revertMs){\n    clearTimeout(this._mascotTimer);\n    this.setState({ mascot:{mood,msg}, mascotOpen:true });\n    if(revertMs) this._mascotTimer=setTimeout(()=>this.setState({mascot:{mood:'idle',msg:''}}), revertMs);\n  }\n  pokeMascot(){\n    const lines=[\"You've got this. One field at a time.\",\"Tip: the green checklist tells you exactly what's left.\",\"A program is built step by step — like the real job.\",\"Need a hand? Each station explains the why and the how.\",\"Accuracy first, then speed. We're doing real ISM work here.\"];\n    this.setMascot('happy', lines[Math.floor(Math.random()*lines.length)], 4000);\n  }\n  closeMascot(){ this.setState({mascotOpen:false}); }\n  completedSet(){ const s={}; this.M.STATIONS.forEach(st=>{ if(st.id!=='console'&&this.done(st.id)) s[st.id]=1; }); return s; }\n  componentDidUpdate(prevProps,prevState){\n    if(!this.state.ready) return;\n    const now=this.completedSet();\n    if(!this._completedSnap){ this._completedSnap=now; return; }\n    const fresh=Object.keys(now).filter(k=>!this._completedSnap[k]);\n    this._completedSnap=now;\n    if(fresh.length){ const st=this.M.STATIONS.find(s=>s.id===fresh[0]); if(st) this.setMascot('happy','✓ '+st.title+' complete — nicely done!',3800); }\n  }\n  handleNext(cur){\n    const st=this.M.STATIONS[cur]; const crit=this.criteria(st.id); const unmet=crit.filter(c=>!c.met);\n    if(unmet.length===0){ this.goTo(cur+1); this.setMascot('happy','On to the next step — keep the momentum!',3000); }\n    else { this.setMascot('oops','Hold on! Still to do here: '+unmet[0].label+(unmet.length>1?(' (+'+(unmet.length-1)+' more)'):'')+'.',5000); }\n  }\n  mascotIdleMsg(station){\n    const crit=this.criteria(station.id); const unmet=crit.filter(c=>!c.met);\n    if(unmet.length===0) return 'This station is complete ✓ — press Next when you\\u2019re ready.';\n    return 'Next up: '+unmet[0].label+'.';\n  }\n\n  // ---- settings / API key ----\n  openSettings(){ this.setState(s=>({settings:{...s.settings, open:true, draftKey:this.apiKey||'', status:'', statusKind:''}})); }\n  closeSettings(){ this.setState(s=>({settings:{...s.settings, open:false}})); }\n  setSettings(patch){ this.setState(s=>({settings:{...s.settings, ...patch}})); }\n  saveKey(){ const k=(this.state.settings.draftKey||'').trim(); this.apiKey=k;\n    try{ if(k) localStorage.setItem(this.AKEY,k); else localStorage.removeItem(this.AKEY); }catch(e){}\n    this.setSettings({status: k?'API key saved — Draft with AI is ready.':'Key field was empty — nothing saved.', statusKind: k?'ok':'warn'}); }\n  clearKey(){ this.apiKey=''; try{ localStorage.removeItem(this.AKEY); }catch(e){}\n    this.setSettings({draftKey:'', status:'API key cleared from this browser.', statusKind:'warn'}); }\n  async testKey(){ const k=(this.state.settings.draftKey||'').trim();\n    if(!k){ this.setSettings({status:'Enter a key first.', statusKind:'warn'}); return; }\n    this.setSettings({testing:true, status:'Testing…', statusKind:'ok'});\n    try{ await this.callAnthropic(k,'Reply with the single word: OK', 12);\n      this.setSettings({testing:false, status:'Success — key works. Don\\u2019t forget to Save.', statusKind:'ok'}); }\n    catch(e){ this.setSettings({testing:false, status:this.apiErrMsg(e), statusKind:'err'}); }\n  }\n  apiErrMsg(e){ const m=String(e&&e.message||e); if(/401|invalid|authentication/i.test(m)) return 'Invalid API key — double-check it.';\n    if(/429/.test(m)) return 'Rate limited — wait a moment and retry.';\n    if(/CORS|Failed to fetch|NetworkError/i.test(m)) return 'Network/CORS blocked the request — check your connection.';\n    return 'Request failed ('+m+').'; }\n  mdToHtml(md){\n    if(!md) return '';\n    const esc=(s)=>s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n    let inB=false; const lines=String(md).split(/\\r?\\n/); let html=''; let para=[];\n    const flushP=()=>{ if(para.length){ html+='<p style=\"margin:0 0 10px;line-height:1.6\">'+inline(para.join(' '))+'<\u002Fp>'; para=[]; } };\n    function inline(t){ t=esc(t); t=t.replace(/\\*\\*([^*]+)\\*\\*/g,'<strong>$1<\u002Fstrong>'); t=t.replace(/\\*([^*]+)\\*/g,'<em>$1<\u002Fem>'); t=t.replace(/`([^`]+)`/g,'<code style=\"background:#EEF2F6;padding:1px 5px;border-radius:5px;font-size:.92em\">$1<\u002Fcode>'); return t; }\n    for(let ln of lines){\n      if(/^\\s*[-*]\\s+/.test(ln)){ flushP(); if(!inB){ html+='<ul style=\"margin:0 0 10px;padding-left:18px;line-height:1.6\">'; inB=true; } html+='<li style=\"margin:2px 0\">'+inline(ln.replace(/^\\s*[-*]\\s+/,''))+'<\u002Fli>'; continue; }\n      if(inB){ html+='<\u002Ful>'; inB=false; }\n      const h=ln.match(/^(#{1,3})\\s+(.*)/);\n      if(h){ flushP(); const sz=h[1].length===1?16:h[1].length===2?14.5:13; html+='<div style=\"font-weight:800;font-size:'+sz+'px;margin:8px 0 5px;color:#0F1729\">'+inline(h[2])+'<\u002Fdiv>'; continue; }\n      if(/^\\s*$/.test(ln)){ flushP(); continue; }\n      para.push(ln.trim());\n    }\n    if(inB) html+='<\u002Ful>'; flushP();\n    return html;\n  }\n  async openExplain(retry){\n    const sel=this.state.selection;\n    const text=(retry?this.state.explain.sel:(sel&&sel.text))||this.state.explain.sel;\n    if(!text) return;\n    const hasKey=!!(this.apiKey&&this.apiKey.trim());\n    const hasClaude=(typeof window!=='undefined' && window.claude && typeof window.claude.complete==='function');\n    this.setState({ explain:{open:true, sel:text, busy:true, text:'', err:''}, selection:null });\n    try{ if(window.getSelection) window.getSelection().removeAllRanges(); }catch(e){}\n    if(!hasKey && !hasClaude){ this.setState(s=>({explain:{...s.explain,busy:false,err:'Add your Anthropic API key in Settings (gear icon, top-left) to use Explain.'}})); return; }\n    const prompt='You are Sentry, a CISM Domain 3 (Information Security Program) study coach. A learner highlighted this text inside an information security program tool:\\n\\n\"\"\"'+text+'\"\"\"\\n\\nExplain it clearly for someone studying for the CISM exam. Cover: what it means in plain language, why it matters to an information security program, and how it connects to CISM Domain 3 concepts. If relevant, give a short real-world example. Keep it under 220 words. Use short markdown (a heading, a few bullets, bold key terms).';\n    try{\n      let out;\n      if(hasKey) out=await this.callAnthropic(this.apiKey.trim(), prompt, 600);\n      else out=await window.claude.complete({ messages:[{role:'user',content:prompt}] });\n      const clean=String(out||'').trim();\n      if(clean) this.setState(s=>({explain:{...s.explain,busy:false,text:clean,err:''}}));\n      else this.setState(s=>({explain:{...s.explain,busy:false,err:'No response — try again.'}}));\n    }catch(e){ this.setState(s=>({explain:{...s.explain,busy:false,err:this.apiErrMsg(e)}})); }\n  }\n  async callAnthropic(key,prompt,maxTokens){\n    const res=await fetch('https://api.anthropic.com/v1/messages',{ method:'POST',\n      headers:{ 'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },\n      body: JSON.stringify({ model:'claude-haiku-4-5', max_tokens:maxTokens||400, messages:[{role:'user',c nst clean=String(out||'').replace(/^[\\s\"'`]+|[\\s\"'`]+$/g,'').trim();\n      if(clean){ this.upd('documents',id,{body:clean}); this.setAi(id,{busy:false,err:''}); }\n      else this.setAi(id,{busy:false,err:'No suggestion came back \\u2014 try again.'});\n    }catch(e){ this.setAi(id,{busy:false,err: hasKey ? this.apiErrMsg(e) : 'Couldn\\u2019t reach the AI service \\u2014 please try again.'}); }\n  }\n\n  // ---- list helpers ----\n  upd(list,id,patch){ this.setP(p=>{ p[list]=p[list].map(x=>x.id===id?{...x,...patch}:x); }); }\n  rm(list,id){ this.setP(p=>{ p[list]=p[list].filter(x=>x.id!==id); }); }\n\n  toggleIn(arr,val){ return arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]; }\n\n  renderVals(){\n    if(!this.state.ready) return { loading:this.state.loading, ready:false };\n    const M=this.M, ST=M.STATIONS, cur=this.state.current, station=ST[cur], p=this.state.program;\n    const isBuild=station.phase==='BUILD';\n    const accent=isBuild?'#15A34A':'#0E9384', deep=isBuild?'#0B7A36':'#107569';\n    const accentBar='background:'+accent+';';\n    const accentText='color:'+deep+';';\n\n    let lastPhase=null;\n    const stations=ST.map((s,i)=>{\n      const active=i===cur, d=this.done(s.id);\n      const ac=s.phase==='BUILD'?'#15A34A':'#0E9384';\n      const showBuild=s.phase==='BUILD'&&lastPhase!=='BUILD';\n      const showRun=s.phase==='RUN'&&lastPhase!=='RUN'; lastPhase=s.phase;\n      return { id:s.id, title:s.title, showBuild, showRun, onClick:()=>this.goTo(i),\n        numLabel: d?'✓':s.tag,\n        rowStyle: active?('background:'+ac+'14;'):'background:transparent;',\n        numStyle: active?('background:'+ac+';color:#fff;'):(d?('background:'+ac+'22;color:'+ac+';'):'background:#EAEEF3;color:#98A2B3;'),\n        textStyle: active?('color:'+ac+';font-weight:800;'):'color:#475467;' };\n    });\n\n    const matPct=this.maturity();\n    const matLabel = matPct>=90?'Optimized':matPct>=60?'Managed':matPct>=30?'Developing':'Initial';\n\n    const base={\n testDrafts&&this._testDrafts[c.id]||{}; const eff=lastEff(c);\n        return { name:c.name, status:c.status, statusColor:this.statusColor(c.status),\n          hasEff:eff>0, effLabel:eff+'/5', effColor:eff>=4?'#2BB673':eff>=3?'#F6A623':'#E5484D',\n          draftMethod:dr.method||'Audit', draftResult:dr.result||'Pass',\n          onMethod:e=>this.setTestDraft(c.id,{method:e.target.value}),\n          onResult:e=>this.setTestDraft(c.id,{result:e.target.value}),\n          effDots:[1,2,3,4,5].map(n=>({ n, onClick:()=>this.setTestDraft(c.id,{eff:n}),\n            style:(dr.eff||0)>=n?('background:'+accent+';color:#fff;'):'background:#EAEEF3;color:#98A2B3;' })),\n          onLogTest:()=>this.logTest(c.id),\n          hasTests:c.tests.length>0, testLog:c.tests.slice(-3).reverse().map(t=>({ result:t.result, method:t.method, eff:t.eff, date:t.date, resultColor:resultColor(t.result) })) }; });\n    }\n\n    if(id==='training'){\n      v.trainAudiences=M.TRAIN_AUDIENCES;\n      const covColor=n=>n>=80?'#2BB673':n>=50?'#F6A623':'#E5484D';\n      v.trainRows=p.training.map(t=>({ audience:t.audience, topic:t.topic, method:t.method, coverage:t.coverage, covColor:covColor(+t.coverage||0),\n        onAudience:e=>this.upd('training',t.id,{audience:e.target.value}),\n        onTopic:e=>this.upd('training',t.id,{topic:e.target.value}),\n        onMethod:e=>this.upd('training',t.id,{method:e.target.value}),\n        onCoverage:e=>this.upd('training',t.id,{coverage:e.target.value.replace(/[^0-9]/g,'').slice(0,3)}),\n        onRemove:()=>this.rm('training',t.id) }));\n      v.draftTraining=this.state.draftTraining;\n      v.onDT_audience=e=>this.setState({draftTraining:{audience:e.target.value}});\n      v.onAddTraining=()=>this.setP(x=>x.training=[...x.training,{id:this.uid('t'),audience:this.state.draftTraining.audience||'All personnel',topic:'',method:'',coverage:0}]);\n    }\n\n    if(id==='vendors'){\n      v.classLevels=M.CLASS_LEVELS;\n      v.vendorSummary=['High','Medium','Low'].map(r=>({ label:r, color:this.riskColor(r), count:p.vendors.filter(x=>x.risk===r).length }));\n      v.vendorRows=p.vendors.map(vd=>({ name:vd.name, service:vd.service, access:vd.access, risk:vd.risk, stage:vd.stage, riskColor:this.riskColor(vd.risk),\n        clauseChips:M.VENDOR_CLAUSES.map(cl=>{ const on=vd.clauses.includes(cl);\n          return { label:cl, onToggle:()=>this.upd('vendors',vd.id,{clauses:this.toggleIn(vd.clauses,cl)}),\n            style:on?('background:'+accent+';border:1.5px solid '+accent+';color:#fff;'):'background:#F4F6F9;border:1.5px solid #DCE2EA;color:#475467;' }; }),\n        onName:e=>this.upd('vendors',vd.id,{name:e.target.value}),\n        onService:e=>this.upd('vendors',vd.id,{service:e.target.value}),\n        onAccess:e=>this.upd('vendors',vd.id,{access:e.target.value}),\n        onRisk:e=>this.upd('vendors',vd.id,{risk:e.target.value}),\n        onStage:e=>this.upd('vendors',vd.id,{stage:e.target.value}),\n        onRemove:()=>this.rm('vendors',vd.id) }));\n      v.draftVendor=this.state.draftVendor;\n      v.onDV_name=e=>this.setState({draftVendor:{name:e.target.value}});\n      v.onAddVendor=()=>{ const n=(this.state.draftVendor.name||'').trim(); if(!n) return;\n        this.setP(x=>x.vendors=[...x.vendors,{id:this.uid('v'),name:n,service:'',access:'Internal',risk:'Medium',clauses:[],stage:'Assessing'}]);\n        this.setState({draftVendor:{name:\"\"}}); };\n    }\n\n    if(id==='console') this.buildConsole(v,p);\n    return v;\n  }\n\n  setTestDraft(cid,patch){ if(!this._testDrafts) this._testDrafts={}; this._testDrafts[cid]={...(this._testDrafts[cid]||{}),...patch}; this.forceUpdate(); }\n  logTest(cid){ const dr=(this._testDrafts&&this._testDrafts[cid])||{}; const eff=dr.eff||3;\n    const date=new Date().toISOString().slice(0,7);\n    this.setP(p=>{ p.controls=p.controls.map(c=>c.id===cid?{...c,status:'Tested',tests:[...c.tests,{method:dr.method||'Audit',result:dr.result||'Pass',eff,note:'',date}]}:c); });\n    if(this._testDrafts) this._testDrafts[cid]={};\n  }\n\n  buildConsole(v,p){\n    const total=p.controls.length;\n    const impl=p.controls.filter(c=>c.status!=='Planned').length;\n    const tested=p.controls.filter(c=>c.status==='Tested');\n    const implPct=total?Math.round(impl/total*100):0;\n    const lastEff=c=>c.tests.length?c.tests[c.tests.length-1].eff:0;\n    const effPct=tested.length?Math.round(tested.reduce((a,c)=>a+lastEff(c),0)/tested.length/5*100):0;\n    const covered=new Set(); p.controls.forEach(c=>c.assetIds.forEach(id=>covered.add(id)));\n    const coverage=p.assets.length?Math.round(covered.size/p.assets.length*100):0;\n    const trainAvg=p.training.length?Math.round(p.training.reduce((a,t)=>a+(+t.coverage||0),0)/p.training.length):0;\n    const vendHigh=p.vendors.filter(x=>x.risk==='High').length;\n\n    v.kpis=[\n      { label:'Program maturity', value:this.maturity()+'%', sub:this.doneCount()+'/'+(this.M.STATIONS.length-1)+' stations', color:'#15A34A' },\n      { label:'Controls', value:String(total), sub:impl+' implemented', color:'#0E9384' },\n      { label:'Implementation', value:implPct+'%', sub:'of controls live', color:'#0E9384' },\n      { label:'Effectiveness', value:effPct+'%', sub:tested.length+' tested', color:(effPct>=70?'#2BB673':effPct>=40?'#F6A623':'#E5484D') },\n      { label:'Asset coverage', value:coverage+'%', sub:'assets with a control', color:'#F6A623' },\n      { label:'Vendor risk', value:String(vendHigh), sub:'high-risk vendors', color:(vendHigh>0?'#E5484D':'#2BB673') }\n    ];\n\n    const maxC=Math.max(1,...this.M.CLASS_LEVELS.map(c=>p.assets.filter(a=>a.cls===c).length));\n    v.classBars=this.M.CLASS_LEVELS.map(c=>{ const n=p.assets.filter(a=>a.cls===c).length;\n      return { label:c, count:n, pct:Math.round(n/maxC*100), color:this.clsColor(c) }; });\n\n    v.reportTitle=p.name;\n    v.reportBody='The program protects '+p.assets.length+' classified assets through '+total+' controls ('+implPct+'% implemented, '+effPct+'% average effectiveness across '+tested.length+' tested). '+\n      p.documents.length+' governing documents are in place and '+p.metrics.length+' metrics are tracked. Awareness coverage averages '+trainAvg+'% and '+p.vendors.length+' external providers are governed'+(vendHigh?', '+vendHigh+' rated high-risk':'')+'. Overall maturity is '+this.maturity()+'%.';\n\n    const gaps=[];\n    const uncovered=p.assets.filter(a=>!covered.has(a.id));\n    if(uncovered.length) gaps.push({ color:'#E5484D', title:uncovered.length+' asset(s) have no control mapped', action:'Design or link a control for: '+uncovered.slice(0,3).map(a=>a.name).join(', ')+(uncovered.length>3?'…':'')+' (Station 06).' });\n    const untested=p.controls.filter(c=>c.status==='Implemented');\n    if(untested.length) gaps.push({ color:'#F6A623', title:untested.length+' implemented control(s) not yet tested', action:'Validate effectiveness in Station 08 before relying on them.' });\n    const weak=p.controls.filter(c=>c.status==='Tested'&&lastEff(c)>0&&lastEff(c)<3);\n    if(weak.length) gaps.push({ color:'#E5484D', title:weak.length+' control(s) tested weak (eff < 3/5)', action:'Redesign through change management: '+weak.map(c=>c.name).join(', ')+'.' });\n    const dtypes=p.documents.map(d=>d.type);\n    ['Policy','Standard','Procedure'].forEach(t=>{ if(!dtypes.includes(t)) gaps.push({ color:'#15A34A', title:'Missing a '+t, action:'Author at least one '+t+' in Station 04 to complete the hierarchy.' }); });\n    const below=p.metrics.filter(m=>(+m.current||0)<(+m.target||0));\n    if(below.length) gaps.push({ color:'#F6A623', title:below.length+' metric(s) below target', action:'Prioritize remediation: '+below.slice(0,3).map(m=>m.name).join(', ')+(below.length>3?'…':'')+'.' });\n    const noClause=p.vendors.filter(x=>x.clauses.length===0);\n    if(noClause.length) gaps.push({ color:'#E5484D', title:noClause.length+' vendor(s) without contract clauses', action:'Add right-to-audit & incident-response clauses in Station 10.' });\n    const noPlan=p.controls.filter(c=>c.status!=='Planned'&&!c.owner);\n    if(noPlan.length) gaps.push({ color:'#15A34A', title:noPlan.length+' live control(s) without an owner', action:'Assign RACI ownership in Station 07 for accountability.' });\n\n    v.gaps=gaps; v.noGaps=gaps.length===0;\n  }\n\n  printReport(){ try{ window.print(); }catch(e){} }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
